<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Diagram Compiler</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Dagre for automatic graph layout -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Gifshot for GIF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .canvas-bg {
            background-color: #f8fafc;
            background-image:
                linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .table-node {
            transition: box-shadow 0.2s, opacity 0.3s ease;
            cursor: grab;
            z-index: 20;
        }

        .table-node:active {
            cursor: grabbing;
        }

        .field-row {
            border-bottom: 1px solid #f1f5f9;
            transition: background-color 0.2s ease;
        }

        .field-row:last-child {
            border-bottom: none;
        }

        .dimmed {
            opacity: 0.15 !important;
        }

        .edge-group {
            pointer-events: auto;
            cursor: pointer;
        }

        .visible-line {
            transition: stroke 0.2s, stroke-width 0.2s;
        }

        .edge-highlight .visible-line {
            stroke: #3b82f6 !important;
            stroke-width: 3 !important;
        }

        .field-highlight {
            background-color: #dbeafe !important;
        }

        .data-flow-line {
            fill: none;
            stroke: #0ea5e9;
            stroke-width: 2;
            stroke-dasharray: 6 12;
            animation: flow 1s linear infinite;
            opacity: 0.8;
            pointer-events: none;
        }

        .edge-highlight .data-flow-line {
            stroke: #2563eb;
            stroke-width: 3;
            opacity: 1;
        }

        .dimmed .data-flow-line {
            display: none;
        }

        @keyframes flow {
            to {
                stroke-dashoffset: -18;
            }
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden flex flex-col bg-white">

    <!-- Export Progress Overlay -->
    <div id="export-overlay"

    <!-- Top Toolbar -->

        </div>

        <!-- Right Panel: Canvas -->
        <div id="canvas-container" class="w-2/3 h-full relative canvas-bg overflow-hidden cursor-move">
            <div id="zoom-layer" class="absolute inset-0" style="transform-origin: 0 0;">
                <svg id="svg-layer" class="absolute inset-0 overflow-visible w-full h-full pointer-events-none"
                    style="z-index: 10;">
                    <defs>
                        <marker id="arrow-end" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
                            <path d="M 0 1 L 9 5 L 0 9 z" fill="#9ca3af" />
                        </marker>
                        <marker id="arrow-start" markerWidth="10" markerHeight="10" refX="1" refY="5"
                            orient="auto-start-reverse">
                            <path d="M 0 1 L 9 5 L 0 9 z" fill="#9ca3af" />
                        </marker>
                        <marker id="arrow-end-highlight" markerWidth="10" markerHeight="10" refX="9" refY="5"
                            orient="auto">
                            <path d="M 0 1 L 9 5 L 0 9 z" fill="#3b82f6" />
                        </marker>
                        <marker id="arrow-start-highlight" markerWidth="10" markerHeight="10" refX="1" refY="5"
                            orient="auto-start-reverse">
                            <path d="M 0 1 L 9 5 L 0 9 z" fill="#3b82f6" />
                        </marker>
                    </defs>
                    <g id="edges-group"></g>
                </svg>

                <div id="nodes-layer" class="absolute inset-0" style="z-index: 20;"></div>
            </div>

    <script>
        const colorMap = {
            blue: { header: 'bg-blue-500', border: 'border-blue-200', text: 'text-blue-50', hex: '#3b82f6', borderHex: '#bfdbfe' },
            purple: { header: 'bg-purple-500', border: 'border-purple-200', text: 'text-purple-50', hex: '#a855f7', borderHex: '#e9d5ff' },
            green: { header: 'bg-emerald-500', border: 'border-emerald-200', text: 'text-emerald-50', hex: '#10b981', borderHex: '#a7f3d0' },
            orange: { header: 'bg-orange-500', border: 'border-orange-200', text: 'text-orange-50', hex: '#f97316', borderHex: '#fed7aa' },
            cyan: { header: 'bg-cyan-500', border: 'border-cyan-200', text: 'text-cyan-50', hex: '#06b6d4', borderHex: '#a5f3fc' },
            yellow: { header: 'bg-yellow-500', border: 'border-yellow-200', text: 'text-yellow-50', hex: '#eab308', borderHex: '#fef08a' },
            red: { header: 'bg-red-500', border: 'border-red-200', text: 'text-red-50', hex: '#ef4444', borderHex: '#fecaca' },
            pink: { header: 'bg-pink-500', border: 'border-pink-200', text: 'text-pink-50', hex: '#ec4899', borderHex: '#fbcfe8' },
            gray: { header: 'bg-gray-600', border: 'border-gray-300', text: 'text-gray-50', hex: '#475569', borderHex: '#cbd5e1' },
            default: { header: 'bg-slate-700', border: 'border-slate-300', text: 'text-slate-50', hex: '#334155', borderHex: '#cbd5e1' }
        };

        let parsedTables = [];
        let parsedRelationships = [];

        const editor = document.getElementById('editor');
        const canvasContainer = document.getElementById('canvas-container');
        const zoomLayer = document.getElementById('zoom-layer');
        const nodesLayer = document.getElementById('nodes-layer');
        const edgesGroup = document.getElementById('edges-group');

        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isPanningCanvas = false;
        let panStartX, panStartY;

        // --- PARSER ---
        function parseCode(code) {
            const tables = [];
            const relationships = [];

            const tableRegex = /([a-zA-Z0-9_]+)\s*(?:\[(.*?)\])?\s*\{([\s\S]*?)\}/g;
            let match;
            while ((match = tableRegex.exec(code)) !== null) {
                const name = match[1];
                const metaStr = match[2] || '';
                const fieldsStr = match[3];

                const meta = {};
                metaStr.split(',').forEach(part => {
                    const kv = part.split(':');
                    if (kv.length === 2) meta[kv[0].trim()] = kv[1].trim();
                });

                const fields = [];
                fieldsStr.split('\n').forEach(line => {
                    line = line.trim();
                    if (!line) return;
                    const parts = line.split(/\s+/);
                    const fieldName = parts[0];
                    const fieldType = parts[1] || '';
                    const isPk = parts.some(p => p.toLowerCase() === 'pk');
                    fields.push({ name: fieldName, type: fieldType, isPk });
                });
                tables.push({ name, meta, fields });
            }

            const relRegex = /([a-zA-Z0-9_]+)\.([a-zA-Z0-9_]+)\s*(<>|-|<|>)\s*([a-zA-Z0-9_]+)\.([a-zA-Z0-9_]+)/g;
            while ((match = relRegex.exec(code)) !== null) {
                relationships.push({
                    sourceTable: match[1],
                    sourceField: match[2],
                    type: match[3],
                    targetTable: match[4],
                    targetField: match[5]
                });
            }

            return { tables, relationships };
        }

        // --- COMPILER & RENDERER ---
        function compileDiagram() {
            const code = editor.value;
            const data = parseCode(code);
            parsedTables = data.tables;
            parsedRelationships = data.relationships;

            nodesLayer.innerHTML = '';
            edgesGroup.innerHTML = '';

            if (parsedTables.length === 0) return;

            const g = new dagre.graphlib.Graph();
            g.setGraph({ rankdir: 'LR', nodesep: 60, ranksep: 250, marginx: 50, marginy: 50 });
            g.setDefaultEdgeLabel(() => ({}));

            parsedTables.forEach(t => {
                const width = 260;
                const height = 45 + (t.fields.length * 33);
                g.setNode(t.name, { width, height });
            });

            parsedRelationships.forEach(r => {
                if (g.hasNode(r.sourceTable) && g.hasNode(r.targetTable)) {
                    g.setEdge(r.sourceTable, r.targetTable);
                }
            });

            dagre.layout(g);

            parsedTables.forEach(t => {
                const nodeLayout = g.node(t.name);
                if (!nodeLayout) return;

                const colorTheme = colorMap[t.meta.color] || colorMap.default;
                const iconName = t.meta.icon || 'table';

                const el = document.createElement('div');
                el.className = `table-node absolute bg-white rounded-lg shadow-md border ${colorTheme.border} flex flex-col`;
                el.style.width = `${nodeLayout.width}px`;
                el.style.left = `${nodeLayout.x - nodeLayout.width / 2}px`;
                el.style.top = `${nodeLayout.y - nodeLayout.height / 2}px`;
                el.dataset.table = t.name;

                let fieldsHtml = t.fields.map(f => `
                    <div class="field-row flex justify-between items-center px-3 py-1.5 text-xs hover:bg-slate-50 transition-colors" data-field="${f.name}">
                        <div class="flex items-center gap-1.5 overflow-hidden">
                            ${f.isPk ? '<i data-lucide="key" class="w-3 h-3 text-yellow-500 shrink-0"></i>' : '<div class="w-3 shrink-0"></div>'}
                            <span class="font-medium text-slate-700 truncate ${f.isPk ? 'font-bold' : ''}">${f.name}</span>
                        </div>
                        <span class="text-slate-400 font-mono text-[10px] shrink-0">${f.type}</span>
                    </div>
                `).join('');

                el.innerHTML = `
                    <div class="table-header ${colorTheme.header} ${colorTheme.text} px-3 py-2.5 rounded-t-lg flex items-center gap-2 select-none border-b border-black/10">
                        <i data-lucide="${iconName}" class="w-4 h-4 opacity-90"></i>
                        <span class="font-semibold text-sm tracking-wide shadow-sm truncate">${t.name}</span>
                    </div>
                    <div class="table-body flex-1 py-1 rounded-b-lg bg-white shadow-inner">
                        ${fieldsHtml}
                    </div>
                `;

                nodesLayer.appendChild(el);
                makeNodeDraggable(el);

                el.addEventListener('mouseenter', () => handleNodeHover(t.name));
                el.addEventListener('mouseleave', clearHoverEffects);
            });

            lucide.createIcons();
            drawEdges();
            setTimeout(resetView, 50);
        }

        // --- EDGE DRAWING ---
        function drawEdges() {
            edgesGroup.innerHTML = '';

            parsedRelationships.forEach(rel => {
                const srcNode = document.querySelector(`.table-node[data-table="${rel.sourceTable}"]`);
                const tgtNode = document.querySelector(`.table-node[data-table="${rel.targetTable}"]`);

                if (!srcNode || !tgtNode) return;

                const srcField = srcNode.querySelector(`[data-field="${rel.sourceField}"]`);
                const tgtField = tgtNode.querySelector(`[data-field="${rel.targetField}"]`);

                if (!srcField || !tgtField) return;

                const srcX = srcNode.offsetLeft;
                const srcY = srcNode.offsetTop + srcField.offsetTop + (srcField.offsetHeight / 2);
                const tgtX = tgtNode.offsetLeft;
                const tgtY = tgtNode.offsetTop + tgtField.offsetTop + (tgtField.offsetHeight / 2);

                const srcWidth = srcNode.offsetWidth;
                const tgtWidth = tgtNode.offsetWidth;

                let startX, startY = srcY;
                let endX, endY = tgtY;
                let isLeftToRight = srcX < tgtX;

                if (isLeftToRight) {
                    startX = srcX + srcWidth;
                    endX = tgtX;
                } else {
                    startX = srcX;
                    endX = tgtX + tgtWidth;
                }

                const distance = Math.max(Math.abs(endX - startX) * 0.5, 50);
                const cp1x = startX + (isLeftToRight ? distance : -distance);
                const cp2x = endX + (isLeftToRight ? -distance : distance);
                const pathD = `M ${startX} ${startY} C ${cp1x} ${startY}, ${cp2x} ${endY}, ${endX} ${endY}`;

                let markerStart = rel.type === '<>' ? 'url(#arrow-start)' : '';
                let markerEnd = (rel.type === '<' || rel.type === '<>') ? 'url(#arrow-end)' : '';

                const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                group.classList.add('edge-group');
                group.dataset.source = rel.sourceTable;
                group.dataset.target = rel.targetTable;

                // Base solid line
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathD);
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke', '#cbd5e1');
                path.setAttribute('stroke-width', '2');
                path.classList.add('visible-line');

                if (markerStart) { path.setAttribute('marker-start', markerStart); path.dataset.markerStart = markerStart; }
                if (markerEnd) { path.setAttribute('marker-end', markerEnd); path.dataset.markerEnd = markerEnd; }

                // Animated data flow line
                const animPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                animPath.setAttribute('d', pathD);
                animPath.classList.add('data-flow-line');

                // Invisible wide hover hit area
                const hoverPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                hoverPath.setAttribute('d', pathD);
                hoverPath.setAttribute('fill', 'none');
                hoverPath.setAttribute('stroke', 'transparent');
                hoverPath.setAttribute('stroke-width', '15');

                group.appendChild(path);
                group.appendChild(animPath);
                group.appendChild(hoverPath);
                edgesGroup.appendChild(group);

                group.addEventListener('mouseenter', () => handleEdgeHover(group, rel));
                group.addEventListener('mouseleave', clearHoverEffects);
            });
        }

        // --- INTERACTIVITY (HOVER) ---
        function handleNodeHover(tableName) {
            if (document.querySelector('.dragging')) return;

            const allNodes = document.querySelectorAll('.table-node');
            const allEdges = document.querySelectorAll('.edge-group');

            const connectedTables = new Set([tableName]);
            parsedRelationships.forEach(rel => {
                if (rel.sourceTable === tableName) connectedTables.add(rel.targetTable);
                if (rel.targetTable === tableName) connectedTables.add(rel.sourceTable);
            });

            allNodes.forEach(node => {
                if (!connectedTables.has(node.dataset.table)) {
                    node.classList.add('dimmed');
                    node.style.zIndex = '20';
                } else {
                    node.style.zIndex = node.dataset.table === tableName ? '40' : '30';
                }
            });

            allEdges.forEach(edge => {
                if (edge.dataset.source === tableName || edge.dataset.target === tableName) {
                    edge.classList.add('edge-highlight');
                    const path = edge.querySelector('.visible-line');
                    if (path.dataset.markerStart) path.setAttribute('marker-start', path.dataset.markerStart.replace(')', '-highlight)'));
                    if (path.dataset.markerEnd) path.setAttribute('marker-end', path.dataset.markerEnd.replace(')', '-highlight)'));
                } else {
                    edge.classList.add('dimmed');
                }
            });
        }

        function handleEdgeHover(edgeGroup, rel) {
            if (document.querySelector('.dragging')) return;

            document.querySelectorAll('.table-node').forEach(node => {
                if (node.dataset.table !== rel.sourceTable && node.dataset.table !== rel.targetTable) {
                    node.classList.add('dimmed');
                } else {
                    node.style.zIndex = '30';
                    const fieldToHighlight = node.dataset.table === rel.sourceTable ? rel.sourceField : rel.targetField;
                    const fieldEl = node.querySelector(`[data-field="${fieldToHighlight}"]`);
                    if (fieldEl) fieldEl.classList.add('field-highlight');
                }
            });

            document.querySelectorAll('.edge-group').forEach(e => {
                if (e !== edgeGroup) e.classList.add('dimmed');
            });

            edgeGroup.classList.add('edge-highlight');
            const path = edgeGroup.querySelector('.visible-line');
            if (path.dataset.markerStart) path.setAttribute('marker-start', path.dataset.markerStart.replace(')', '-highlight)'));
            if (path.dataset.markerEnd) path.setAttribute('marker-end', path.dataset.markerEnd.replace(')', '-highlight)'));
        }

        function clearHoverEffects() {
            if (document.querySelector('.dragging')) return;

            document.querySelectorAll('.dimmed, .edge-highlight, .field-highlight').forEach(el => {
                el.classList.remove('dimmed', 'edge-highlight', 'field-highlight');
            });
            document.querySelectorAll('.table-node').forEach(node => {
                node.style.zIndex = '20';
            });
            document.querySelectorAll('.edge-group .visible-line').forEach(path => {
                if (path.dataset.markerStart) path.setAttribute('marker-start', path.dataset.markerStart);
                if (path.dataset.markerEnd) path.setAttribute('marker-end', path.dataset.markerEnd);
            });
        }

        // --- INTERACTIVITY (DRAG NODES) ---
        function makeNodeDraggable(el) {
            const header = el.querySelector('.table-header');
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;

            header.addEventListener('mousedown', (e) => {
                isDragging = true;
                clearHoverEffects();
                el.classList.add('dragging');
                el.parentNode.appendChild(el);

                startX = e.clientX;
                startY = e.clientY;
                initialLeft = el.offsetLeft;
                initialTop = el.offsetTop;
                el.style.boxShadow = "0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1)";
                e.stopPropagation();
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = (e.clientX - startX) / scale;
                const dy = (e.clientY - startY) / scale;
                el.style.left = `${initialLeft + dx}px`;
                el.style.top = `${initialTop + dy}px`;
                drawEdges();
            });

            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    el.classList.remove('dragging');
                    el.style.boxShadow = "";
                }
            });
        }

        // --- INTERACTIVITY (PAN & ZOOM) ---
        function updateCanvasTransform() {
            zoomLayer.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        canvasContainer.addEventListener('mousedown', (e) => {
            if (e.target === canvasContainer || e.target.id === 'zoom-layer' || e.target.closest('svg')) {
                isPanningCanvas = true;
                panStartX = e.clientX - translateX;
                panStartY = e.clientY - translateY;
                canvasContainer.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPanningCanvas) return;
            translateX = e.clientX - panStartX;
            translateY = e.clientY - panStartY;
            updateCanvasTransform();
        });

        window.addEventListener('mouseup', () => {
            isPanningCanvas = false;
            canvasContainer.style.cursor = 'move';
        });

        canvasContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY * -0.0015;
            const newScale = Math.max(0.15, Math.min(scale * (1 + delta), 3));
            const rect = canvasContainer.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            translateX = mouseX - (mouseX - translateX) * (newScale / scale);
            translateY = mouseY - (mouseY - translateY) * (newScale / scale);
            scale = newScale;
            updateCanvasTransform();
        }, { passive: false });

        function resetView() {
            if (parsedTables.length === 0) return;
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

            document.querySelectorAll('.table-node').forEach(node => {
                const left = node.offsetLeft, top = node.offsetTop;
                const right = left + node.offsetWidth, bottom = top + node.offsetHeight;
                if (left < minX) minX = left; if (top < minY) minY = top;
                if (right > maxX) maxX = right; if (bottom > maxY) maxY = bottom;
            });

            const contentWidth = maxX - minX;
            const contentHeight = maxY - minY;
            const containerWidth = canvasContainer.clientWidth;
            const containerHeight = canvasContainer.clientHeight;

            const scaleX = (containerWidth - 100) / contentWidth;
            const scaleY = (containerHeight - 100) / contentHeight;
            scale = Math.min(scaleX, scaleY, 1);

            translateX = (containerWidth - (contentWidth * scale)) / 2 - (minX * scale);
            translateY = (containerHeight - (contentHeight * scale)) / 2 - (minY * scale);
            updateCanvasTransform();
        }

        // --- EXPORT ENGINE ---
        function generateSVGString(includeAnimation = false, dashOffset = null) {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            const nodes = document.querySelectorAll('.table-node');
            nodes.forEach(node => {
                const l = node.offsetLeft, t = node.offsetTop;
                const r = l + node.offsetWidth, b = t + node.offsetHeight;
                if (l < minX) minX = l; if (t < minY) minY = t;
                if (r > maxX) maxX = r; if (b > maxY) maxY = b;
            });

            const pad = 60;
            minX -= pad; minY -= pad; maxX += pad; maxY += pad;
            const width = maxX - minX;
            const height = maxY - minY;

            let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${minX} ${minY} ${width} ${height}" width="${width}" height="${height}">`;

            svg += `
            <defs>
                <marker id="arrow-end" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 1 L 9 5 L 0 9 z" fill="#9ca3af" /></marker>
                <marker id="arrow-start" markerWidth="10" markerHeight="10" refX="1" refY="5" orient="auto-start-reverse"><path d="M 0 1 L 9 5 L 0 9 z" fill="#9ca3af" /></marker>
                <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/></filter>
                <clipPath id="header-clip"><rect x="0" y="0" width="260" height="40" rx="8" ry="8"/></clipPath>
            </defs>
            <style>
                .bg { fill: #f8fafc; }
                .table-bg { fill: #ffffff; stroke-width: 1; }
                .text-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #ffffff; }
                .text-field { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; fill: #334155; font-weight: 500; }
                .text-field-pk { font-weight: 700; }
                .text-type { font-family: monospace; font-size: 10px; fill: #94a3b8; text-anchor: end; }
                .line-default { stroke: #cbd5e1; stroke-width: 2; fill: none; }
                ${includeAnimation ? `
                .line-anim { stroke: #0ea5e9; stroke-width: 2; fill: none; stroke-dasharray: 6 12; animation: flow 1s linear infinite; opacity: 0.8; }
                @keyframes flow { to { stroke-dashoffset: -18; } }
                ` : ''}
                ${dashOffset !== null ? `
                .line-flow-frame { stroke: #0ea5e9; stroke-width: 2; fill: none; stroke-dasharray: 6 12; opacity: 0.8; }
                ` : ''}
            </style>
            <rect x="${minX}" y="${minY}" width="${width}" height="${height}" class="bg" />`;

            const edgeGroups = document.querySelectorAll('.edge-group');
            edgeGroups.forEach(g => {
                const pathEl = g.querySelector('.visible-line');
                const d = pathEl.getAttribute('d');
                const mStart = pathEl.getAttribute('marker-start') ? 'marker-start="url(#arrow-start)"' : '';
                const mEnd = pathEl.getAttribute('marker-end') ? 'marker-end="url(#arrow-end)"' : '';

                svg += `<path d="${d}" class="line-default" ${mStart} ${mEnd} />`;

                if (includeAnimation) {
                    svg += `<path d="${d}" class="line-anim" />`;
                } else if (dashOffset !== null) {
                    svg += `<path d="${d}" class="line-flow-frame" stroke-dashoffset="${dashOffset}" />`;
                }
            });

            nodes.forEach(node => {
                const tableName = node.dataset.table;
                const tableData = parsedTables.find(t => t.name === tableName);
                const colors = colorMap[tableData.meta.color] || colorMap.default;

                const x = node.offsetLeft;
                const y = node.offsetTop;
                const w = node.offsetWidth;

                // Calculate EXACT required height to fix bottom clip issue during export
                const requiredHeight = 40 + (tableData.fields.length * 33) + 6; // 6px bottom padding
                const h = Math.max(node.offsetHeight, requiredHeight);

                svg += `<g transform="translate(${x}, ${y})" filter="url(#shadow)">`;
                svg += `<rect x="0" y="0" width="${w}" height="${h}" rx="8" ry="8" class="table-bg" stroke="${colors.borderHex}" />`;
                svg += `<g clip-path="url(#header-clip)"><rect x="0" y="0" width="${w}" height="40" fill="${colors.hex}" /></g>`;
                svg += `<text x="32" y="25" class="text-title">${tableName}</text>`;

                const iconSvg = node.querySelector('.table-header svg').outerHTML;
                svg += `<g transform="translate(8, 12)" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">${iconSvg.replace('<svg', '<g').replace('</svg>', '</g>')}</g>`;

                tableData.fields.forEach((f, i) => {
                    const rowY = 40 + (i * 33);
                    const textY = rowY + 21;

                    if (f.isPk) {
                        svg += `<path d="M11 2a2 2 0 0 0-2 2v5H4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h5a2 2 0 0 0 2-2v-5h5a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-5z" fill="none" stroke="#eab308" stroke-width="2" transform="translate(12, ${rowY + 8}) scale(0.6)"/>`;
                        svg += `<circle cx="16" cy="${rowY + 13.5}" r="1" fill="#eab308"/>`;
                    }

                    svg += `<text x="32" y="${textY}" class="text-field ${f.isPk ? 'text-field-pk' : ''}">${f.name}</text>`;
                    svg += `<text x="${w - 12}" y="${textY}" class="text-type">${f.type}</text>`;

                    if (i < tableData.fields.length - 1) {
                        svg += `<line x1="0" y1="${rowY + 33}" x2="${w}" y2="${rowY + 33}" stroke="#f1f5f9" stroke-width="1" />`;
                    }
                });

                svg += `</g>`;
            });

            svg += `</svg>`;
            return svg;
        }

        function triggerDownload(uri, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = uri;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- EXPORT PROGRESS OVERLAY ---
        const exportOverlay = document.getElementById('export-overlay');
        const exportModal = document.getElementById('export-modal');
        const exportTitle = document.getElementById('export-title');
        const exportProgressBar = document.getElementById('export-progress-bar');
        const exportProgressText = document.getElementById('export-progress-text');

        function showOverlay(format) {
            exportTitle.textContent = `Exporting ${format}`;
            exportProgressBar.style.width = `0%`;
            exportProgressText.textContent = `0%`;
            exportOverlay.classList.remove('hidden');
            void exportOverlay.offsetWidth; // Trigger reflow
            exportOverlay.classList.remove('opacity-0');
            exportModal.classList.remove('scale-95');
        }

        function updateOverlay(percent) {
            exportProgressBar.style.width = `${percent}%`;
            exportProgressText.textContent = `${percent}%`;
        }

        function hideOverlay() {
            exportOverlay.classList.add('opacity-0');
            exportModal.classList.add('scale-95');
            setTimeout(() => exportOverlay.classList.add('hidden'), 300);
        }

        // --- BINDINGS ---
        document.getElementById('btn-compile').addEventListener('click', compileDiagram);
        document.getElementById('btn-reset-view').addEventListener('click', resetView);

        document.getElementById('btn-export-svg').addEventListener('click', () => {
            showOverlay('SVG');
            setTimeout(() => {
                updateOverlay(50);
                const svgString = generateSVGString(false);
                const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
                updateOverlay(100);
                setTimeout(() => {
                    triggerDownload(URL.createObjectURL(blob), 'schema-diagram.svg');
                    hideOverlay();
                }, 300);
            }, 50);
        });

        document.getElementById('btn-export-png').addEventListener('click', () => {
            showOverlay('High-Res PNG');
            setTimeout(() => {
                updateOverlay(20);
                const svgString = generateSVGString(false);
                const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(blob);

                const img = new Image();
                img.onload = () => {
                    updateOverlay(50);
                    setTimeout(() => {
                        const canvas = document.createElement('canvas');
                        const scale = 4; // High-Res multiplier
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');

                        ctx.fillStyle = '#f8fafc';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);

                        ctx.scale(scale, scale);
                        ctx.drawImage(img, 0, 0);

                        updateOverlay(80);
                        setTimeout(() => {
                            triggerDownload(canvas.toDataURL('image/png', 1.0), 'schema-diagram.png');
                            URL.revokeObjectURL(url);
                            updateOverlay(100);
                            setTimeout(hideOverlay, 300);
                        }, 50);
                    }, 50);
                };
                img.src = url;
            }, 50);
        });

        // Generate GIF
        document.getElementById('btn-export-gif').addEventListener('click', async () => {
            showOverlay('Animated GIF');

            try {
                const totalFrames = 15;
                const frameImages = [];

                // Fetch dimensions from SVG string to maintain aspect ratio
                const dummySvg = generateSVGString(false, 0);
                const matchW = dummySvg.match(/width="([\d.]+)"/);
                const matchH = dummySvg.match(/height="([\d.]+)"/);
                const origW = matchW ? parseFloat(matchW[1]) : 800;
                const origH = matchH ? parseFloat(matchH[1]) : 600;

                // High-Res limit for GIF to balance memory and quality
                const maxDim = 2400;
                let gifScale = 2; // Target 2x high resolution
                if (origW * gifScale > maxDim || origH * gifScale > maxDim) {
                    gifScale = maxDim / Math.max(origW, origH);
                }
                const gifW = Math.round(origW * gifScale);
                const gifH = Math.round(origH * gifScale);

                for (let i = 0; i < totalFrames; i++) {
                    const offset = -18 * (i / totalFrames); // Simulate stroke-dashoffset animation
                    const svgStr = generateSVGString(false, offset);

                    const img = new Image();
                    const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
                    const url = URL.createObjectURL(blob);

                    await new Promise((resolve, reject) => {
                        img.onload = () => resolve();
                        img.onerror = reject;
                        img.src = url;
                    });

                    const canvas = document.createElement('canvas');
                    canvas.width = gifW;
                    canvas.height = gifH;
                    const ctx = canvas.getContext('2d');

                    // Fill background
                    ctx.fillStyle = '#f8fafc';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.scale(gifScale, gifScale);
                    ctx.drawImage(img, 0, 0);
                    frameImages.push(canvas.toDataURL('image/png'));
                    URL.revokeObjectURL(url);

                    updateOverlay(Math.round((i / totalFrames) * 40));
                }

                gifshot.createGIF({
                    images: frameImages,
                    gifWidth: gifW,
                    gifHeight: gifH,
                    interval: 1 / 15, // 15 frames per sec
                    numWorkers: 2,
                    sampleInterval: 10,
                    progressCallback: function (captureProgress) {
                        updateOverlay(40 + Math.round(captureProgress * 60));
                    }
                }, function (obj) {
                    if (!obj.error) {
                        triggerDownload(obj.image, 'schema-diagram.gif');
                    } else {
                        alert('Error generating GIF');
                    }
                    updateOverlay(100);
                    setTimeout(hideOverlay, 300);
                });
            } catch (err) {
                console.error("GIF export failed:", err);
                hideOverlay();
                alert("Export failed. Please check the console.");
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            compileDiagram();
        });

    </script>
</body>
